catalogMode: strict
cleanupUnusedCatalogs: true
minimumReleaseAge: 4320
minimumReleaseAgeStrict: false
minimumReleaseAgeExclude:
  - '@fabdeh/*'
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # 30 days
trustLockfile: true
blockExoticSubdeps: true
packages:
