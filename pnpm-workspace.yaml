  - MyNetatmo24.Frontend
allowBuilds:
  '@fabdeh/eslint-config': false
  '@parcel/watcher': false
  '@scarf/scarf': false
  '@tailwindcss/oxide': false
  esbuild: false
  lmdb: false
  msgpackr-extract: false
  unrs-resolver: false

