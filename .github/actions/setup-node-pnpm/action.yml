name: Setup Node.js and pnpm
description: Install pnpm, set up Node.js with pnpm cache, and install dependencies.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
    - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
      with:
        node-version: lts/*
        check-latest: true
        cache: pnpm
    - run: pnpm install --prefer-offline --frozen-lockfile --recursive
      shell: bash
