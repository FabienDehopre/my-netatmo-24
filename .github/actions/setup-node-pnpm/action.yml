name: Setup Node.js and pnpm
description: Install pnpm, set up Node.js with pnpm cache, and install dependencies.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: lts/*
        check-latest: true
        cache: pnpm
    - run: pnpm install --prefer-offline --frozen-lockfile --recursive
      shell: bash
