name: test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Request Auth0 token
        run: |
          curl -f -sS -i -X POST "https://${AUTH0_DOMAIN}/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=http://auth0.com/oauth/grant-type/password-realm" \
            --data-urlencode "username=${PLAYWRIGHT_USERNAME}" \
            --data-urlencode "password=${PLAYWRIGHT_PASSWORD}" \
            --data-urlencode "client_id=${AUTH0_CLIENT_ID}" \
            --data-urlencode "client_secret=${AUTH0_CLIENT_SECRET}" \
            --data-urlencode "realm=Username-Password-Authentication" \
            --data-urlencode "scope=openid"
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          PLAYWRIGHT_USERNAME: ${{ secrets.PLAYWRIGHT_USERNAME }}
          PLAYWRIGHT_PASSWORD: ${{ secrets.PLAYWRIGHT_PASSWORD }}
