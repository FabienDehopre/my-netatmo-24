name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  merge_group:

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-dotnet
      - run: dotnet build --configuration Release
        name: Build .NET Solution
      - run: >
          dotnet test --no-build --configuration Release --
          --coverage
          --coverage-output coverage.xml
          --coverage-output-format cobertura
          --coverage-settings "${{ github.workspace }}/coverage.config"
        env:
          TUNIT_GITHUB_REPORTER_STYLE: collapsible
        name: Run .NET Tests
      - uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # v5
        with:
          reports: '**/coverage.xml'
          targetdir: coveragereport
          reporttypes: 'HtmlInline;Cobertura;MarkdownSummaryGithub'
          tag: '${{ github.run_number }}_${{ github.run_id }}'
          customSettings: 'minimumCoverageThresholds:lineCoverage=70'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: CoverageReport
          path: coveragereport
      - run: gh pr comment $PR_NUMBER --body-file coveragereport/SummaryGithub.md
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        name: Report .NET Coverage
      - run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        name: Publish coverage in build summary
#      - uses: stoplightio/spectral-action@6416fd018ae38e60136775066eb3e98172143141 # v0.8.13
#        with:
#          file_glob: '**/documentation/*.json'

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm --filter='end-to-end-tests' exec playwright install --with-deps chromium
        timeout-minutes: 2
        name: Install Playwright Browsers
      - run: pnpm --filter='frontend-app' build
        name: Build frontend app
      - run: pnpm -r lint
      - run: pnpm --filter='!end-to-end-tests' test --coverage
        name: Unit test all frontend projects
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        name: Upload Vitest coverage report artifact
        with:
          name: coverage-frontend
          path: MyNetatmo24.Frontend/coverage/MyNetatmo24.Frontend
      - name: Report Vitest Coverage
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2
        with:
          threshold-icons: "{0: '🔴', 50: '🟠', 70: '🟢'}"
          json-summary-path: MyNetatmo24.Frontend/coverage/MyNetatmo24.Frontend/coverage-summary.json
          json-final-path: MyNetatmo24.Frontend/coverage/MyNetatmo24.Frontend/coverage-final.json
          file-coverage-mode: 'all'
          name: 'Frontend Vitest Coverage'


  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-dotnet
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm --filter='end-to-end-tests' exec playwright install --with-deps chromium firefox
        timeout-minutes: 2
        name: Install Playwright Browsers
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        name: OIDC Login to Azure Public Cloud
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true
      - run: |
          curl -Lo sops "https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/
        name: Install SOPS
      - run: sops --decrypt "config/appsettings.encrypted.json" > "MyNetatmo24.AppHost/appsettings.json"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        name: Decrypt appsettings.json
      - run: npm install -g @microsoft/aspire-cli && aspire --version
        name: Install Aspire
      # - run: pnpm --filter='end-to-end-tests' test --config=playwright.service.config.ts
      - run: pnpm --filter='end-to-end-tests' test
        env:
          # PLAYWRIGHT_SERVICE_URL: ${{ secrets.PLAYWRIGHT_SERVICE_URL }}
          PLAYWRIGHT_USERNAME: ${{ secrets.PLAYWRIGHT_USERNAME }}
          PLAYWRIGHT_PASSWORD: ${{ secrets.PLAYWRIGHT_PASSWORD }}
          APPLICATION_URL: ${{ vars.APPLICATION_URL }}
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          Auth0__Domain: ${{ secrets.AUTH0_DOMAIN }}
        name: E2E test frontend projects
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        name: Upload E2E Results Artifact
        with:
          name: playwright-report
          path: MyNetatmo24.EndToEndTests/playwright-report
      - run: |
         unzip -o MyNetatmo24.EndToEndTests/aspire-export/all-resources.zip \
            -d MyNetatmo24.EndToEndTests/aspire-export/all-resources
        if: ${{ !cancelled() }}
        name: Unzip Aspire Export Artifact
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        name: Upload Aspire Export Artifact
        with:
          name: aspire-export
          path: MyNetatmo24.EndToEndTests/aspire-export/all-resources
