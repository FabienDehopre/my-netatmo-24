name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  merge_group:

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
      - run: dotnet build --configuration Release
        name: Build .NET Solution
      - run: >
          dotnet test --no-build --configuration Release --
            --coverage
            --coverage-output coverage.xml
            --coverage-output-format cobertura
            --coverage-settings "${{ github.workspace }}/coverage.config"
        env:
          TUNIT_GITHUB_REPORTER_STYLE: collapsible
        name: Run .NET Tests
      - uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # v5
        with:
          reports: '**/coverage.xml'
          targetdir: coveragereport
          reporttypes: 'HtmlInline;Cobertura;MarkdownSummaryGithub'
          tag: '${{ github.run_number }}_${{ github.run_id }}'
          customSettings: 'minimumCoverageThresholds:lineCoverage=70'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: CoverageReport
          path: coveragereport
      - run: gh pr comment $PR_NUMBER --body-file coveragereport/SummaryGithub.md
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        name: Report .NET Coverage
      - run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        name: Publish coverage in build summary
#      - uses: stoplightio/spectral-action@6416fd018ae38e60136775066eb3e98172143141 # v0.8.13
#        with:
#          file_glob: '**/documentation/*.json'

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          check-latest: true
          cache: pnpm
      - run: pnpm install --prefer-offline --frozen-lockfile --recursive
      - run: pnpm --filter='end-to-end-tests' exec playwright install --with-deps
        timeout-minutes: 2
        name: Install Playwright Browsers
      - run: pnpm --filter='frontend-app' build
        name: Build frontend app
      - run: pnpm -r lint
      - run: pnpm --filter='!end-to-end-tests' test --coverage
        name: Unit test all frontend projects
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        name: Upload Vitest coverage report artifact
        with:
          name: coverage-frontend
          path: MyNetatmo24.Frontend/coverage
      - name: Report Vitest Coverage
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2
        with:
          threshold-icons: "{0: '🔴', 50: '🟠', 70: '🟢'}"
          json-summary-path: MyNetatmo24.Frontend/coverage/coverage-summary.json
          json-final-path: MyNetatmo24.Frontend/coverage/coverage-final.json
          file-coverage-mode: 'all'
          name: 'Frontend Vitest Coverage'


  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          check-latest: true
          cache: pnpm
      - run: pnpm install --prefer-offline --frozen-lockfile --recursive
      - run: |
          dotnet dev-certs https --export-path /tmp/aspire-dev-certs.pem --format pem --no-password
          sudo cp /tmp/aspire-dev-certs.pem /usr/local/share/ca-certificates/aspire-dev-certs.crt
          sudo update-ca-certificates
        name: Trust .NET dev certs
      - run: |
          curl -Lo sops "https://github.com/getsops/sops/releases/download/v3.13.1/sops-v3.13.1.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/
        name: Install SOPS
      - run: sops --decrypt "config/appsettings.encrypted.json" > "MyNetatmo24.AppHost/appsettings.json"
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        name: Decrypt appsettings.json
      # - run: pnpm --filter='end-to-end-tests' test --config=playwright.service.config.ts
      - run: pnpm --filter='end-to-end-tests' test
        env:
          # PLAYWRIGHT_SERVICE_URL: ${{ secrets.PLAYWRIGHT_SERVICE_URL }}
          PLAYWRIGHT_USERNAME: ${{ secrets.PLAYWRIGHT_USERNAME }}
          PLAYWRIGHT_PASSWORD: ${{ secrets.PLAYWRIGHT_PASSWORD }}
          APPLICATION_URL: ${{ vars.APPLICATION_URL }}
          DATABASE_URL: ${{ vars.DATABASE_URL }}
        name: E2E test frontend projects
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        name: Upload E2E Results Artifact
        with:
          name: playwright-report
          path: MyNetatmo24.EndToEndTests/playwright-report
