<div class="md:flex md:items-center md:justify-between">
  <div class="min-w-0 flex-1">
    <h2 class="
      text-2xl/7 font-bold text-gray-900
      sm:truncate sm:text-3xl sm:tracking-tight
      dark:text-white
    ">
      {{ title() }}
    </h2>
  </div>
  <div class="
    mt-4 flex
    md:mt-0 md:ml-4
  ">
    <button
      *appAnonymous
      class="
        rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900
        shadow-xs inset-ring inset-ring-gray-300
        hover:bg-gray-50
        dark:bg-white/10 dark:text-white dark:shadow-none
        dark:inset-ring-white/5
        dark:hover:bg-white/20
      "
      type="button"
      (click)="login()"
    >
      Sign in
    </button>
    <el-dropdown *appAuthenticated class="inline-block">
      <button
        class="
          inline-flex w-full justify-center gap-x-1.5 rounded-md bg-white px-3
          py-2 text-sm font-semibold text-gray-900 shadow-xs inset-ring-1
          inset-ring-gray-300
          hover:bg-gray-50
          dark:bg-white/10 dark:text-white dark:shadow-none
          dark:inset-ring-white/5
          dark:hover:bg-white/20
        "
        type="button"
      >
        {{ user()?.name }}
        <svg aria-hidden="true" class="-mr-1 size-5 text-gray-400" data-slot="icon" fill="currentColor" viewBox="0 0 20 20">
          <path clip-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" fill-rule="evenodd" />
        </svg>
      </button>
      <el-menu anchor="bottom end" class="
        w-56 origin-top-right rounded-md bg-white shadow-lg outline-1
        outline-black/5 transition transition-discrete
        [--anchor-gap:--spacing(2)]
        data-closed:scale-95 data-closed:transform data-closed:opacity-0
        data-enter:duration-100 data-enter:ease-out
        data-leave:duration-75 data-leave:ease-in
        dark:bg-gray-800 dark:shadow-none dark:-outline-offset-1
        dark:outline-white/10
      " popover>
        <div class="py-1">
          <button
            class="
              block w-full px-4 py-2 text-left text-sm text-gray-700
              focus:bg-gray-100 focus:text-gray-900 focus:outline-hidden
              dark:text-gray-300
              dark:focus:bg-white/5 dark:focus:text-white
            "
            type="button"
            (click)="logout()">
            Sign out
          </button>
        </div>
      </el-menu>
    </el-dropdown>
  </div>
</div>
<div *appAuthenticated
     class="
       px-4
       sm:px-6
       lg:px-8
     ">
  <div class="sm:flex sm:items-center">
    <div class="sm:flex-auto">
      <h1 class="
        text-base font-semibold text-gray-900
        dark:text-white
      ">Weather Forecast</h1>
      <p class="
        mt-2 text-sm text-gray-700
        dark:text-gray-300
      ">
        The weather for the next few days.
      </p>
    </div>
    <div class="
      mt-4
      sm:mt-0 sm:ml-16 sm:flex-none
    ">
      <button
        class="btn btn-primary"
        type="button"
        (click)="loadWeatherForecast()"
      >
        Load Forecast
      </button>
    </div>
  </div>
  <div class="mt-8 flow-root">
    <div class="
      overflow-x-auto rounded-box border border-base-content/5 bg-base-100
    ">
        <table class="table table-zebra">
          <thead>
            <tr>
              <th>Date</th>
              <th>Temp. (C)</th>
              <th>Temp. (F)</th>
              <th>Summary</th>
            </tr>
          </thead>
          <tbody>
          @for (forecast of weatherForecasts.value(); track $index) {
            <tr>
              <td>{{ forecast.date | date }}</td>
              <td>{{ forecast.temperatureC }}</td>
              <td>{{ forecast.temperatureF }}</td>
              <td>{{ forecast.summary }}</td>
            </tr>
          }
          </tbody>
        </table>
    </div>
  </div>
</div>
<router-outlet />
