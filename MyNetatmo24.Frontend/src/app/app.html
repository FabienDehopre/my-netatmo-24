<div *appAuthenticated
     class="
       px-4
       sm:px-6
       lg:px-8
     ">
  <div class="sm:flex sm:items-center">
    <div class="sm:flex-auto">
      <h1 class="
        text-base font-semibold text-gray-900
        dark:text-white
      ">Weather Forecast</h1>
      <p class="
        mt-2 text-sm text-gray-700
        dark:text-gray-300
      ">
        The weather for the next few days.
      </p>
    </div>
    <div class="
      mt-4
      sm:mt-0 sm:ml-16 sm:flex-none
    ">
      <button hlmBtn type="button" variant="default" (click)="loadWeatherForecast()">Load Forecast</button>
    </div>
  </div>
  <div class="mt-8 flow-root">
    <div class="
      rounded-box border-base-content/5 bg-base-100 overflow-x-auto border
    ">
        <table class="table-zebra table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Temp. (C)</th>
              <th>Temp. (F)</th>
              <th>Summary</th>
            </tr>
          </thead>
          <tbody>
          @for (forecast of weatherForecasts.value(); track $index) {
            <tr>
              <td>{{ forecast.date | date }}</td>
              <td>{{ forecast.temperatureC }}</td>
              <td>{{ forecast.temperatureF }}</td>
              <td>{{ forecast.summary }}</td>
            </tr>
          }
          </tbody>
        </table>
    </div>
  </div>
</div>
<router-outlet />
