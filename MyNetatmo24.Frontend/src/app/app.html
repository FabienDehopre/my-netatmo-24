@if (showLayout()) {
  <div class="md:flex md:items-center md:justify-between">
    <div class="min-w-0 flex-1">
      <h2 class="
        text-2xl/7 font-bold text-gray-900
        sm:truncate sm:text-3xl sm:tracking-tight
        dark:text-white
      ">
        {{ title() }}
      </h2>
    </div>
    <div class="
      mt-4 flex
      md:mt-0 md:ml-4
    ">
      <button *appAnonymous hlmBtn type="button" variant="outline" (click)="login()">Sign in</button>
      <ng-container *appAuthenticated>
        <button hlmBtn type="button" variant="outline" [hlmDropdownMenuTrigger]="menu">{{ user()?.name }}</button>
        <ng-template #menu>
          <hlm-dropdown-menu>
            <hlm-dropdown-menu-group>
              <button hlmDropdownMenuItem type="button" variant="destructive" (click)="logout()">
                <ng-icon name="lucideLogOut" />
                Sign out
              </button>
            </hlm-dropdown-menu-group>
          </hlm-dropdown-menu>
        </ng-template>
      </ng-container>
    </div>
  </div>
}
<router-outlet />
